name: 건강 뉴스 모니터

on:
  schedule:
    - cron: '0 */6 * * *'  # 6시간마다 실행
  workflow_dispatch:        # 수동 트리거

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4 lxml

      - name: Check keywords.json
        run: |
          if [ ! -f data/news/keywords.json ]; then
            echo "키워드 목록 생성 중..."
            python scripts/generate_news_keywords.py
          fi

      - name: Fetch from Korea news sources
        run: python scripts/fetchers/korea_news.py

      - name: Process and generate pages
        run: python scripts/process_news.py

      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          [ -d data/news ] && git add data/news/*.json 2>/dev/null || true
          [ -d docs/_news ] && git add docs/_news/
          [ -f docs/data/news-index.json ] && git add docs/data/news-index.json || true

          if git diff --staged --quiet; then
            echo "뉴스 업데이트 없음"
          else
            git commit -m "건강 뉴스 업데이트 $(date +%Y-%m-%d-%H%M)"
            git push
          fi
